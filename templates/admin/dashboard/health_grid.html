<div class="dash-card">
  <div class="dash-card-header">
    <div>
      <h3 class="text-base font-bold text-text-strong">System Health</h3>
      <p class="text-xs text-text-muted mt-0.5">Service status</p>
    </div>
    <span class="w-8 h-8 rounded-xl bg-primary/10 text-primary flex items-center justify-center text-sm border border-primary/20"><i class="bi bi-pulse"></i></span>
  </div>
  <div class="p-4 pt-0 space-y-1">
    {% for item in items %}
    <a href="{% url 'admin_system_status' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-primary/[0.03] transition-colors group">
      <span class="w-2 h-2 rounded-full flex-shrink-0 {{ item.dot_class }}"></span>
      <span class="text-sm font-semibold text-text-primary flex-1 truncate group-hover:text-primary transition-colors">{{ item.label }}</span>
      <span class="text-xs text-text-muted truncate max-w-[140px]">{{ item.sub }}</span>
    </a>
    {% empty %}
    <p class="text-xs text-text-muted text-center py-4">No health data</p>
    {% endfor %}
  </div>
  <div class="px-4 pb-4">
    <a href="{% url 'admin_system_status' %}" class="block text-center text-xs font-bold text-primary hover:text-primary-hover bg-primary/5 hover:bg-primary/10 py-2.5 rounded-xl transition-colors">
      View full status →
    </a>
  </div>
</div>
