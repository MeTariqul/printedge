<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Approved - PrintEdge</title>
    <!--[if mso]>
    <xml>
      <o:OfficeDocumentSettings>
        <o:AllowPNG/>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
    <![endif]-->
</head>
<body style="margin: 0; padding: 0; background-color: #f1f5f9; font-family: Arial, Helvetica, sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08);">
        <!-- Header -->
        <tr>
            <td align="center" style="background: linear-gradient(135deg, #2563eb, #1d4ed8); padding: 30px 20px;">
                <a href="https://printedge.vercel.app" style="text-decoration: none;">
                    <img src="/static/icons/logo.svg" alt="PrintEdge Logo" width="120" style="display: block; margin: 0 auto;" onerror="this.onerror=null;this.src='/static/icons/logo.png'">
                </a>
                <h1 style="color: #ffffff; font-size: 24px; font-weight: 600; margin: 20px 0 0 0;">Account Approved</h1>
            </td>
        </tr>

        <!-- Body -->
        <tr>
            <td style="padding: 40px 30px 30px;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <td>
                            <p style="font-size: 16px; line-height: 1.6; color: #0f172a; margin: 0 0 16px;">
                                Hello {{ user.first_name|default:user.email }},
                            </p>

                            <p style="font-size: 16px; line-height: 1.6; color: #475569; margin: 0 0 24px;">
                                Your account has been approved! You can now log in and start placing print orders.
                            </p>

                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td align="center">
                                        <a href="https://printedge.vercel.app/auth/login/" style="display: inline-block; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #ffffff; text-decoration: none; font-size: 16px; font-weight: 600; padding: 14px 32px; border-radius: 12px;">
                                            Log In Now
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>

        <!-- Footer -->
        <tr>
            <td style="background-color: #f8fafc; padding: 30px; text-align: center; border-top: 1px solid #e2e8f0;">
                <p style="font-size: 14px; color: #64748b; margin: 0 0 8px;">PrintEdge &copy; 2026</p>
                <p style="font-size: 12px; color: #94a3b8; margin: 0;">This is an automated message. Please do not reply to this email.</p>
            </td>
        </tr>
    </table>
</body>
</html>
