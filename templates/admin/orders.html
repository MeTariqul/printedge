{% extends "admin_base.html" %}
{% block title %}All Orders | Print-Edge Admin{% endblock %}
{% block breadcrumb %}Orders{% endblock %}

{% block content %}
<div class="pe-page-head">
    <div>
        <h1 class="text-2xl font-bold text-text-primary mb-1">All Orders</h1>
        <p class="text-text-muted text-sm"><span id="orderCount">{{ total_count }}</span> total orders</p>
    </div>
    <div class="flex gap-2">
    <a href="{% url 'admin_orders_export' %}?{{ request.GET.urlencode }}" class="inline-flex items-center gap-2 px-5 py-2.5 min-h-[44px] rounded-lg font-bold border border-surface-border text-text-secondary hover:bg-surface transition-colors">
        <i class="bi bi-download"></i> Export CSV
    </a>
    </div>
</div>

<!-- Bulk Actions Bar -->
<form method="post" id="bulkForm">
{% csrf_token %}
<input type="hidden" name="bulk_action" id="bulkActionInput" value="">
<input type="hidden" name="bulk_status_value" id="bulkStatusValue" value="">
<div class="pe-action-bar" id="bulkBar" style="display:none;">
    <span class="text-sm text-text-muted whitespace-nowrap"><span id="selectedCount">0</span> selected</span>
    <div class="flex flex-wrap gap-2 flex-1">
        <select id="bulkStatusSelect" class="px-3 py-2 rounded-lg bg-surface-input border border-surface-border text-text-primary text-xs focus:border-primary focus:outline-none">
            {% for key, label in status_choices %}
            <option value="{{ key }}">{{ label }}</option>
            {% endfor %}
        </select>
        <button type="button" onclick="submitBulkAction('bulk_status')" class="px-4 py-2 min-h-[44px] rounded-lg bg-primary text-white text-xs font-bold hover:bg-blue-600 transition-colors">
            <i class="bi bi-pencil-square"></i> Update Status
        </button>
        <button type="button" onclick="confirmBulkDelete()" class="px-4 py-2 min-h-[44px] rounded-lg bg-danger text-white text-xs font-bold hover:bg-red-700 transition-colors">
            <i class="bi bi-trash3"></i> Delete
        </button>
    </div>
</div>

<!-- Filters -->
<div class="pe-card p-4 pe-mb">
    <form method="get" class="pe-filter-bar"
          hx-get="{% url 'admin_orders_table' %}"
          hx-target="#order-table-container"
          hx-push-url="true"
          hx-trigger="submit">
        <div class="relative flex-1" style="min-width:180px">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <i class="bi bi-search text-text-muted text-sm"></i>
            </div>
            <input type="text" name="q" value="{{ search_query }}"
                   placeholder="Search by order #, name, phone…"
                   class="w-full pl-9 pr-4 py-2.5 rounded-xl bg-surface-input border border-surface-border text-text-primary text-sm placeholder-text-muted focus:border-primary focus:outline-none"
                   hx-get="{% url 'admin_orders_table' %}"
                   hx-target="#order-table-container"
                   hx-trigger="keyup changed delay:300ms"
                   hx-include="[name='status'],[name='source']">
        </div>
        <select name="status"
                hx-get="{% url 'admin_orders_table' %}"
                hx-target="#order-table-container"
                hx-trigger="change"
                hx-include="[name='q'],[name='source']"
                class="px-4 py-2.5 rounded-xl bg-surface-input border border-surface-border text-text-primary text-sm focus:border-primary focus:outline-none">
            <option value="">All Status</option>
            {% for key, label in status_choices %}
            <option value="{{ key }}" {% if current_status == key %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
        <select name="source"
                hx-get="{% url 'admin_orders_table' %}"
                hx-target="#order-table-container"
                hx-trigger="change"
                hx-include="[name='q'],[name='status']"
                class="px-4 py-2.5 rounded-xl bg-surface-input border border-surface-border text-text-primary text-sm focus:border-primary focus:outline-none">
            <option value="">All Sources</option>
            <option value="online" {% if current_source == 'online' %}selected{% endif %}>Online</option>
            <option value="offline" {% if current_source == 'offline' %}selected{% endif %}>Walk-in</option>
        </select>
    </form>
</div>

<div id="order-table-container">
    {% include "partials/_order_table.html" %}
</div>
</form>
{% endblock %}
