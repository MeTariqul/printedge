{% extends "base.html" %}
{% block title %}Password Reset Complete — Print-Edge{% endblock %}

{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;">
  <div class="card" style="max-width:450px;width:100%;padding:2.5rem;text-align:center;">
    <div style="width:64px;height:64px;border-radius:50%;background:rgba(16,185,129,.1);color:var(--success);display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 1.5rem;">
      <i class="bi bi-check-circle-fill"></i>
    </div>
    
    <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:.5rem;">Password Updated</h2>
    <p class="text-muted" style="font-size:14px;margin-bottom:2rem;">Your password has been successfully reset. You may now log in with your new password.</p>
    
    <a href="{% url 'auth_login_page' %}" class="btn btn-primary w-100">Log In Now</a>
  </div>
</div>
{% endblock %}
