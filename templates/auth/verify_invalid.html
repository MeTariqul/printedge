{% extends "base.html" %}
{% load static %}
{% block title %}Verification Failed | PrintEdge{% endblock %}
{% block content %}
<section class="flex items-center justify-center px-4 py-12 min-h-[80vh]">
    <div class="w-full max-w-md premium-card rounded-2xl p-6 md:p-8 text-center animate-fade-in">
        <img src="{% static 'icons/logo.png' %}" alt="PrintEdge" class="h-10 w-auto mx-auto mb-6 object-contain">
        <div class="w-16 h-16 rounded-full bg-red-500/20 text-red-400 flex items-center justify-center mx-auto mb-4 text-2xl">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <h1 class="text-xl md:text-2xl font-bold text-white mb-2">Verification Failed</h1>
        <p class="text-neutral-400 text-sm mb-6">
            This verification link is invalid or has expired.<br>
            <span class="text-xs text-neutral-500 mt-2 block">Please request a new verification email.</span>
        </p>
        <form method="post" action="{% url 'auth_verify_pending' %}" class="mb-4">
            {% csrf_token %}
            <input type="hidden" name="resend" value="1">
            <button type="submit" class="w-full py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-brand-600 to-purple-600 hover:from-brand-500 hover:to-purple-500 shadow-lg shadow-brand-500/25 transition-all min-h-[44px]">
                <i class="bi bi-arrow-repeat"></i> Resend verification email
            </button>
        </form>
        <a href="{% url 'auth_login_page' %}" class="text-sm text-neutral-400 hover:text-white transition-colors min-h-[44px] inline-block px-4 py-2">Back to Login</a>
    </div>
</section>
{% endblock %}
