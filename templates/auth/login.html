{% extends "base.html" %}
{% block title %}Sign In | PrintEase{% endblock %}

{% block content %}
<div class="fixed inset-0 overflow-hidden pointer-events-none mix-blend-screen z-[-1]">
    <div class="absolute top-[-20%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-brand-600/20 blur-[120px]"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-600/20 blur-[120px]"></div>
</div>

<div class="flex-grow flex items-center justify-center px-4 py-12 relative z-10 min-h-[calc(100vh-8rem)]">
    <div class="w-full max-w-md animate-fade-in">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-tr from-brand-600 to-purple-600 flex items-center justify-center text-white shadow-xl shadow-brand-500/20 mb-6">
                <i class="bi bi-printer-fill text-3xl"></i>
            </div>
            <h1 class="text-3xl font-display font-bold text-white mb-2">Welcome Back</h1>
            <p class="text-neutral-500 font-medium">Enter your credentials to access your account</p>
        </div>

        <div class="premium-card rounded-3xl p-8 shadow-2xl">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-2">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                            <i class="bi bi-envelope text-neutral-500"></i>
                        </div>
                        <input type="email" name="email" required autocomplete="email" autofocus
                               class="w-full pl-11 pr-4 py-3.5 rounded-xl bg-white/5 border border-white/10 text-white placeholder-neutral-600 focus:border-brand-500 focus:bg-white/10 transition-colors outline-none font-medium"
                               placeholder="student@g.bracu.ac.bd">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider">Password</label>
                        <a href="{% url 'password_reset' %}" class="text-xs font-bold text-brand-400 hover:text-brand-300">Forgot password?</a>
                    </div>
                    <div class="relative" x-data="{ show: false }">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                            <i class="bi bi-lock text-neutral-500"></i>
                        </div>
                        <input :type="show ? 'text' : 'password'" name="password" required autocomplete="current-password"
                               class="w-full pl-11 pr-12 py-3.5 rounded-xl bg-white/5 border border-white/10 text-white placeholder-neutral-600 focus:border-brand-500 focus:bg-white/10 transition-colors outline-none font-medium"
                               placeholder="••••••••">
                        <button type="button" @click="show = !show" class="absolute inset-y-0 right-0 flex items-center pr-4 text-neutral-500 hover:text-white transition-colors">
                            <i class="bi" :class="show ? 'bi-eye-slash' : 'bi-eye'"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center">
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" name="remember" class="w-4 h-4 rounded border-white/10 bg-white/5 text-brand-500 focus:ring-brand-500 focus:ring-offset-black">
                        <span class="text-sm font-medium text-neutral-400 group-hover:text-white transition-colors">Keep me signed in</span>
                    </label>
                </div>

                <button type="submit" class="w-full py-4 rounded-xl font-bold text-white bg-gradient-to-r from-brand-600 to-purple-600 hover:from-brand-500 hover:to-purple-500 shadow-xl shadow-brand-500/25 transition-all hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2">
                    <i class="bi bi-box-arrow-in-right text-lg"></i>
                    Sign In
                </button>
            </form>
            
            <div class="mt-8 text-center border-t border-white/5 pt-6">
                <p class="text-sm text-neutral-500 font-medium">
                    Don't have an account? 
                    <a href="{% url 'auth_register_page' %}" class="text-brand-400 hover:text-brand-300 font-bold ml-1">Create one →</a>
                </p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
