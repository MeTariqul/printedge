{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<link rel="stylesheet" href="{% static 'css/premium.css' %}">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
<script src="{% static 'js/app.js' %}" defer></script>
{% if user.is_authenticated %}
<script id="supabase-realtime-config" type="application/json">{"url": "{{ SUPABASE_URL|escapejs }}", "anonKey": "{{ SUPABASE_ANON_KEY|escapejs }}", "userId": {{ user.pk }} }</script>
<script src="{% static 'js/realtime.js' %}" defer></script>
{% endif %}
{% if SITE.chat_widget_id %}
{% if SITE.chat_provider == 'tawk' %}
<script>var Tawk_API=Tawk_API||{},Tawk_LoadStart=new Date();(function(){var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];s1.async=true;s1.src='https://embed.tawk.to/{{ SITE.chat_widget_id }}/default';s1.charset='UTF-8';s1.setAttribute('crossorigin','*');s0.parentNode.insertBefore(s1,s0);})();</script>
{% elif SITE.chat_provider == 'crisp' %}
<script>window.$crisp=[];window.CRISP_WEBSITE_ID="{{ SITE.chat_widget_id }}";(function(){var d=document,s=d.createElement("script");s.src="https://client.crisp.chat/l.js";s.async=1;d.getElementsByTagName("head")[0].appendChild(s);})();</script>
{% endif %}
{% endif %}
