{% extends "admin_base.html" %}
{% block title %}Settings | PrintEase Admin{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto animate-fade-in">
    <p class="text-neutral-500 mb-8">Update business details used across the site and receipts.</p>

    <form method="post" class="premium-card rounded-2xl p-8 space-y-6">
        {% csrf_token %}

        <section>
            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                <i class="bi bi-building text-brand-400"></i> Business profile
            </h2>
            <div class="grid sm:grid-cols-2 gap-4">
                <div class="sm:col-span-2">
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-2">Business name</label>
                    <input type="text" name="business_name" value="{{ site.business_name }}"
                           class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:border-brand-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-2">Phone</label>
                    <input type="text" name="business_phone" value="{{ site.business_phone }}"
                           class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:border-brand-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-2">Email</label>
                    <input type="email" name="business_email" value="{{ site.business_email }}"
                           class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:border-brand-500 outline-none">
                </div>
                <div class="sm:col-span-2">
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-2">Address</label>
                    <input type="text" name="business_address" value="{{ site.business_address }}"
                           class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:border-brand-500 outline-none">
                </div>
                <div class="sm:col-span-2">
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-2">Business hours</label>
                    <input type="text" name="business_hours" value="{{ site.business_hours }}"
                           class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:border-brand-500 outline-none">
                </div>
            </div>
        </section>

        <section class="border-t border-white/5 pt-6">
            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                <i class="bi bi-sliders text-brand-400"></i> Order settings
            </h2>
            <div class="grid sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-2">Urgent surcharge (%)</label>
                    <input type="number" name="urgent_surcharge_percent" min="0" max="200" value="{{ site.urgent_surcharge_percent }}"
                           class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:border-brand-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase tracking-wider mb-2">Auto-delete files (days)</label>
                    <input type="number" name="auto_delete_files_days" min="1" max="365" value="{{ site.auto_delete_files_days }}"
                           class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:border-brand-500 outline-none">
                </div>
            </div>
        </section>

        <button type="submit" class="w-full py-4 rounded-xl font-bold text-white bg-gradient-to-r from-brand-600 to-purple-600 hover:from-brand-500 hover:to-purple-500 transition-all flex items-center justify-center gap-2">
            <i class="bi bi-save"></i> Save settings
        </button>
    </form>
</div>
{% endblock %}
