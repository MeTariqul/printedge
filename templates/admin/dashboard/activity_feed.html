<div class="premium-card rounded-2xl overflow-hidden">
  <div class="p-5 md:p-6 border-b border-surface-border">
    <h3 class="text-lg font-bold text-text-primary">Recent Activity</h3>
    <p class="text-xs text-text-muted font-medium mt-1">Latest 5 events</p>
  </div>
  <div class="p-4 md:p-6 max-h-[520px] overflow-y-auto space-y-3">
    {% for ev in events %}
    <a href="{{ ev.link|default:'#' }}" class="flex items-start gap-3 p-3 rounded-xl bg-surface/60 hover:bg-surface transition-colors group">
      <div class="w-9 h-9 rounded-lg bg-slate-800 flex items-center justify-center flex-shrink-0 border border-slate-700/60">
        <i class="{{ ev.icon }} text-sm text-cyan-400"></i>
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-sm text-text-primary font-medium leading-snug">{{ ev.text }}</p>
        <p class="text-[11px] text-text-muted mt-1 font-medium">{{ ev.time }}</p>
      </div>
    </a>
    {% empty %}
    <p class="text-sm text-text-muted text-center py-6">No recent activity</p>
    {% endfor %}
  </div>
</div>
