<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
  {% for item in items %}
  <a href="{{ item.href|default:'#' }}" class="premium-card rounded-2xl p-4 flex items-center gap-4 hover:border-primary/40 transition-colors group">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 {{ item.badge_class }}">
      <i class="{{ item.icon }}"></i>
    </div>
    <div class="min-w-0 flex-1">
      <p class="text-sm font-bold text-text-primary truncate">{{ item.label }}</p>
      <p class="text-xs text-text-muted">{{ item.sub|default:'' }}</p>
    </div>
    {% if item.count %}
    <span class="text-lg font-bold text-text-primary">{{ item.count }}</span>
    {% endif %}
  </a>
  {% endfor %}
</div>
