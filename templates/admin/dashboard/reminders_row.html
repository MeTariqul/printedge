<div class="dash-card" x-data="{ open: true }">
  <button @click="open = !open" class="w-full flex items-center justify-between dash-card-header hover:bg-primary/[0.02] transition-colors cursor-pointer">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-xl bg-primary/10 text-primary flex items-center justify-center text-sm border border-primary/20">
        <i class="bi bi-bell-fill"></i>
      </div>
      <div class="text-left">
        <h3 class="text-base font-bold text-text-strong">Alerts & Reminders</h3>
        <p class="text-xs text-text-muted mt-0.5">{{ items|length }} pending</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      {% if items %}
      <span class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-danger-text/10 text-danger-text border border-danger-text/20">{{ items|length }}</span>
      {% endif %}
      <i class="bi text-text-muted transition-transform duration-200" :class="open ? 'bi-chevron-up rotate-0' : 'bi-chevron-down'"></i>
    </div>
  </button>
  <div x-show="open" x-collapse>
    {% for item in items %}
    <a href="{{ item.href|default:'#' }}"
       class="flex items-center gap-4 px-5 py-4 border-t border-surface-border last:border-b-0 hover:bg-primary/[0.02] transition-colors group">
      <div class="w-1 h-10 rounded-full flex-shrink-0
        {% if item.count >= 10 %}bg-danger-text
        {% elif item.count >= 1 %}bg-warning-text
        {% else %}bg-info{% endif %}">
      </div>
      <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 border {{ item.badge_class }}">
        <i class="{{ item.icon }}"></i>
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-sm font-bold text-text-primary group-hover:text-primary transition-colors">{{ item.label }}</p>
        <p class="text-xs text-text-muted mt-0.5">{{ item.sub|default:'' }}</p>
      </div>
      {% if item.count %}
      <span class="px-2.5 py-1 rounded-full text-xs font-bold
        {% if item.count >= 10 %}bg-danger-text/10 text-danger-text border border-danger-text/20
        {% elif item.count >= 1 %}bg-warning-text/10 text-warning-text border border-warning-text/20
        {% else %}bg-success-text/10 text-success-text border border-success-text/20{% endif %}">
        {{ item.count }}
      </span>
      {% endif %}
    </a>
    {% empty %}
    <div class="p-8 text-center">
      <div class="w-14 h-14 rounded-2xl bg-success-text/10 flex items-center justify-center mx-auto mb-3">
        <i class="bi bi-check2-circle text-2xl text-success-text"></i>
      </div>
      <p class="text-sm font-bold text-text-muted">All clear — no alerts</p>
    </div>
    {% endfor %}
  </div>
</div>
