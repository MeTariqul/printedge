<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print-Edge Notification</title>
</head>
<body style="margin: 0; padding: 0; background-color: #0f172a; font-family: Arial, Helvetica, sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px; margin: 0 auto; background-color: #1e293b;">
        <tr>
            <td align="center" style="padding: 30px 20px;">
                <h1 style="color: #14b8a6; font-size: 22px; margin: 0;">Print-Edge</h1>
            </td>
        </tr>
        <tr>
            <td style="padding: 24px 30px; color: #e2e8f0;">
                <p style="font-size: 16px; margin: 0 0 16px;">
                    Hello {{ recipient.first_name|default:recipient.email }},
                </p>
                <p style="font-size: 16px; margin: 0 0 12px;">
                    <strong>{{ verb }}</strong>
                </p>
                {% if description %}
                <p style="font-size: 14px; color: #94a3b8; margin: 0 0 24px;">{{ description }}</p>
                {% endif %}
                {% if target_url %}
                <p style="margin: 24px 0 0;">
                    <a href="https://printedge.vercel.app{{ target_url }}" style="display: inline-block; background: #14b8a6; color: #0f172a; text-decoration: none; font-weight: 600; padding: 12px 24px; border-radius: 8px;">View details</a>
                </p>
                {% endif %}
            </td>
        </tr>
        <tr>
            <td style="padding: 20px; text-align: center; color: #64748b; font-size: 12px;">
                Print-Edge &copy; 2026 — automated notification
            </td>
        </tr>
    </table>
</body>
</html>
