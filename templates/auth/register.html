{% extends "base.html" %}
{% block title %}Register — Print-Edge{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:460px;">
    <div class="card" style="padding:2.5rem;">
      <div style="text-align:center;margin-bottom:2rem;">
        <div class="navbar-logo" style="margin:0 auto 1rem;width:48px;height:48px;font-size:20px;"><i class="bi bi-printer-fill"></i></div>
        <h1 style="font-size:1.6rem;">Create your account</h1>
        <p class="text-muted" style="font-size:14px;margin-top:.3rem;">Start printing in minutes</p>
      </div>

      <form method="post">
        {% csrf_token %}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="Tariqul Islam" required>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" name="phone" class="form-control" placeholder="01XXXXXXXXX" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-group-icon">
            <i class="bi bi-envelope icon"></i>
            <input type="email" name="email" class="form-control" placeholder="you@gmail.com" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-group-icon">
            <i class="bi bi-lock icon"></i>
            <input type="password" name="password" class="form-control" placeholder="Min 8 characters" required minlength="8">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div class="input-group-icon">
            <i class="bi bi-lock-fill icon"></i>
            <input type="password" name="password2" class="form-control" placeholder="Repeat password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-pill" style="width:100%;padding:.75rem;font-size:15px;">
          <i class="bi bi-person-plus-fill"></i> Create Account
        </button>
      </form>

      <div style="text-align:center;margin-top:1.5rem;font-size:14px;color:var(--text-muted);">
        Already have an account? <a href="{% url 'auth_login_page' %}" style="font-weight:600;">Sign in →</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
