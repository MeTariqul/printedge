{% extends "base.html" %}
{% block title %}Reset Password | PrintEdge{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
  <div class="card p-8 max-w-md w-full text-center">
    <i class="bi bi-key-fill text-4xl text-accent mb-4 block"></i>
    <h2 class="text-xl font-bold mb-2">Forgot password?</h2>
    <p class="text-text-muted text-sm mb-6">Enter your email and we'll send a reset link.</p>
    <form method="post" class="text-left space-y-4">
      {% csrf_token %}
      <div>
        <label class="form-label" for="id_email">Email</label>
        <input type="email" name="email" id="id_email" class="form-input" required>
      </div>
      <button type="submit" class="btn-primary w-full">Send reset link</button>
    </form>
    <a href="{% url 'auth_login_page' %}" class="inline-block mt-6 text-sm text-primary font-semibold">← Back to login</a>
  </div>
</div>
{% endblock %}
