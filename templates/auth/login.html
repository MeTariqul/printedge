{% extends "base.html" %}
{% block title %}Login — Print-Edge{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:420px;">
    <div class="card" style="padding:2.5rem;">
      <div style="text-align:center;margin-bottom:2rem;">
        <div class="navbar-logo" style="margin:0 auto 1rem;width:48px;height:48px;font-size:20px;"><i class="bi bi-printer-fill"></i></div>
        <h1 style="font-size:1.6rem;">Welcome back</h1>
        <p class="text-muted" style="font-size:14px;margin-top:.3rem;">Sign in to Print-Edge</p>
      </div>

      <form method="post" id="loginForm">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-group-icon">
            <i class="bi bi-envelope icon"></i>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;">
            <label class="form-label" style="margin:0;">Password</label>
            <a href="{% url 'password_reset' %}" style="font-size:12px;color:var(--primary);text-decoration:none;">Forgot password?</a>
          </div>
          <div class="input-group-icon">
            <i class="bi bi-lock icon"></i>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-pill" style="width:100%;padding:.75rem;font-size:15px;margin-top:.5rem;">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>

      <div style="text-align:center;margin-top:1.5rem;font-size:14px;color:var(--text-muted);">
        Don't have an account?
        <a href="{% url 'auth_register_page' %}" style="font-weight:600;">Create one →</a>
      </div>
    </div>

    <p class="text-muted" style="text-align:center;font-size:12px;margin-top:1rem;">
      By signing in you agree to our terms of service.
    </p>
  </div>
</div>
{% endblock %}
