<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Display — PrintEase</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body { background: #000; color: #fff; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
    .display-header { padding: 1.5rem 3rem; border-bottom: 2px solid #222; display: flex; justify-content: space-between; align-items: center; }
    .display-grid { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 100px); }
    .col-printing { background: #0a0a0a; border-right: 2px solid #222; padding: 3rem; display: flex; flex-direction: column; }
    .col-ready { background: #000; padding: 3rem; display: flex; flex-direction: column; }
    .disp-title { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 2rem; }
    .order-number { font-size: 5rem; font-weight: 900; line-height: 1.1; margin-bottom: 1rem; }
    .text-printing { color: #3b82f6; text-shadow: 0 0 40px rgba(59,130,246,0.5); }
    .text-ready { color: #10b981; text-shadow: 0 0 40px rgba(16,185,129,0.5); }
    .queue-list { font-size: 2rem; font-weight: 600; color: #888; display: flex; flex-direction: column; gap: 1rem; }
  </style>
</head>
<body>
  <div class="display-header">
    <div style="font-size:1.5rem;font-weight:800;letter-spacing:1px;color:#fff">PRINTEASE <span style="color:#6366f1">CAMPUS</span></div>
    <div id="clock" style="font-size:1.5rem;font-weight:600;color:#888">10:45 AM</div>
  </div>
  <div class="display-grid">
    <div class="col-printing">
      <div class="disp-title">Now Printing</div>
      <div class="order-number text-printing" id="currentPrint">PE-ON-0027</div>
      <div style="font-size:1.5rem;color:#888;margin-top:auto">Up Next:</div>
      <div class="queue-list mt-2">
        <div>PE-OFF-0028</div>
        <div>PE-ON-0029</div>
      </div>
    </div>
    <div class="col-ready">
      <div class="disp-title">Ready for Pickup</div>
      <div class="order-number text-ready" style="animation:pulse 2s infinite">PE-ON-0026</div>
      <div class="order-number text-ready" style="font-size:3rem;color:#4ade80">PE-OFF-0025</div>
    </div>
  </div>
  <script>
    setInterval(() => {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    }, 1000);
    // Add logic to fetch latest orders here
  </script>
</body>
</html>
