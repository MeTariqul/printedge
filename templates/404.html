{% extends "base.html" %}
{% block title %}404 - Page Not Found | PrintEase{% endblock %}

{% block content %}
<div class="flex-grow flex items-center justify-center px-4 py-12 relative z-10 min-h-[calc(100vh-8rem)]">
    <div class="w-full max-w-xl animate-fade-in text-center">
        <div class="mb-8">
            <h1 class="text-9xl font-display font-bold text-white mb-2">404</h1>
            <p class="text-xl text-neutral-400 font-medium mt-4">Oops! We couldn't find the page you were looking for.</p>
        </div>
        <a href="{% url 'public_index' %}" class="inline-flex py-4 px-8 rounded-xl font-bold text-white bg-gradient-to-r from-brand-600 to-purple-600 hover:from-brand-500 hover:to-purple-500 shadow-xl shadow-brand-500/25 transition-all hover:scale-[1.02] active:scale-[0.98] items-center justify-center gap-2">
            <i class="bi bi-house-door-fill text-lg"></i>
            Back to Home
        </a>
    </div>
</div>
{% endblock %}
